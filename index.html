<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover,user-scalable=yes">
  <meta name="theme-color" content="#215f3c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mapa Interativo — Summerville Resort</title>
  <style>
    :root{--green:#087352;--green-dark:#064a36;--green-bg:#265f3e;--blue:#0787ca;--ink:#203229;--muted:#64726b;--paper:#fff;--line:#dce5df;--gold:#ffd84b;--shadow:0 12px 34px rgba(8,34,23,.28)}
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--green-bg)}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);overscroll-behavior:none;-webkit-text-size-adjust:100%}
    button,input{font:inherit}button{color:inherit}.app,.viewport{position:relative;width:100%;height:100vh;overflow:hidden}.viewport{height:var(--app-height,100vh);background:radial-gradient(circle at 50% 44%,#568d58 0,#326f48 46%,#174d35 100%);touch-action:none;cursor:grab;isolation:isolate}.viewport.dragging{cursor:grabbing}
    .scene-fit{position:absolute;left:50%;top:50%;width:100vw;height:170.91vw;transform:translate(-50%,-50%);filter:drop-shadow(0 9px 28px rgba(0,0,0,.28))}.scene-pan{position:absolute;inset:0;transform-origin:50% 50%;will-change:transform}.map-image{width:100%;height:100%;display:block;pointer-events:none;user-select:none;-webkit-user-select:none;-webkit-user-drag:none}
    .route-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;filter:drop-shadow(0 2px 3px rgba(0,0,0,.8)) drop-shadow(0 0 4px rgba(255,255,255,.9))}.route-shadow{fill:none;stroke:#123f32;stroke-width:10;stroke-linecap:round;stroke-linejoin:round;opacity:.97;vector-effect:non-scaling-stroke}.route-line{fill:none;stroke:var(--gold);stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:10 7;animation:routeFlow .8s linear infinite;vector-effect:non-scaling-stroke}@keyframes routeFlow{to{stroke-dashoffset:-17}}
    .pins{position:absolute;inset:0}.pin{position:absolute;width:30px;height:38px;transform:translate(-50%,-100%);border:0;background:transparent;padding:0;cursor:pointer;z-index:3;filter:drop-shadow(0 3px 3px rgba(0,0,0,.45));-webkit-tap-highlight-color:transparent}.pin svg{width:100%;height:100%;display:block}.pin.active{transform:translate(-50%,-100%) scale(1.18);z-index:7;filter:drop-shadow(0 0 5px #fff) drop-shadow(0 4px 4px rgba(0,0,0,.5))}.pin-dot{position:absolute;left:9px;top:9px;width:12px;height:12px;border-radius:50%;background:var(--pin-color);border:2px solid #fff}.pin-tip{position:absolute;left:50%;bottom:44px;transform:translateX(-50%);max-width:170px;padding:5px 8px;border-radius:7px;background:#fff;color:#24342c;font-size:10px;font-weight:800;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.28)}
    .reception{position:absolute;left:52.5%;top:82.4%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:6px;z-index:6;pointer-events:none}.reception-dot{width:17px;height:17px;border:4px solid #fff;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(8,115,82,.65);animation:pulse 2s infinite}.reception-label{padding:5px 8px;border-radius:7px;background:rgba(255,255,255,.95);font-size:10px;font-weight:850;white-space:nowrap;box-shadow:0 2px 9px rgba(0,0,0,.26)}@keyframes pulse{70%{box-shadow:0 0 0 13px rgba(8,115,82,0)}100%{box-shadow:0 0 0 0 rgba(8,115,82,0)}}
    .top-search{position:absolute;z-index:20;left:16px;top:16px;top:max(16px,env(safe-area-inset-top));width:368px;height:48px;border-radius:10px;background:rgba(255,255,255,.94);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);box-shadow:var(--shadow);display:flex;align-items:center;overflow:hidden}.icon-btn{width:48px;height:48px;border:0;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer}.icon-btn svg{width:22px;height:22px;fill:none;stroke:var(--green);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}.search-input{border:0;outline:0;background:transparent;min-width:0;flex:1;color:#33433b;font-size:15px}.search-input::placeholder{color:#748079}.clear-search{display:none}.clear-search.visible{display:flex}
    .category-strip{position:absolute;z-index:19;top:max(16px,env(safe-area-inset-top));left:400px;right:164px;display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch}.category-strip::-webkit-scrollbar{display:none}.category{height:34px;border:1px solid rgba(0,0,0,.1);border-radius:8px;background:#f8faf8;padding:0 14px;white-space:nowrap;font-size:12px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.13)}.category.active{background:linear-gradient(#0a8562,#087052);border-color:#075d47;color:#fff}
    .lang-switch{position:absolute;z-index:22;top:16px;top:max(16px,env(safe-area-inset-top));right:16px;height:42px;padding:5px;display:flex;gap:5px;background:rgba(255,255,255,.96);border-radius:10px;box-shadow:var(--shadow)}.lang-switch button{width:39px;height:32px;border:0;background:transparent;border-radius:7px;padding:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}.flag-icon{display:block;width:29px;height:19px;border-radius:3px;overflow:hidden;box-shadow:0 0 0 1px rgba(0,0,0,.25),0 1px 2px rgba(0,0,0,.2)}.lang-switch button.active{background:var(--green)}.lang-switch button.active .flag-icon{box-shadow:0 0 0 2px #fff,0 1px 3px rgba(0,0,0,.3)}
    .sidebar{position:absolute;z-index:24;left:16px;top:80px;bottom:16px;width:368px;border-radius:12px;background:rgba(249,251,249,.96);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:transform .22s ease,opacity .22s}.sidebar.closed{transform:translateX(calc(-100% - 26px));opacity:0;pointer-events:none}.list-head{min-height:52px;padding:0 12px;display:flex;align-items:center;border-bottom:1px solid var(--line);background:#fff}.list-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}.close-red{width:38px;height:38px;flex:0 0 38px;border:0;border-radius:50%;background:#ef2f2f;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 11px rgba(190,20,20,.3)}.close-red svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:3.2;stroke-linecap:round}.places{overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}.place{display:grid;grid-template-columns:58px minmax(0,1fr) 82px;gap:10px;min-height:78px;padding:9px 10px;border-bottom:1px solid #d7e0da;background:transparent}.place.selected{background:#e5f1eb}.place-thumb{width:58px;height:58px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:27px;color:#fff;background:var(--thumb);box-shadow:inset 0 0 0 1px rgba(255,255,255,.3)}.place-copy{min-width:0;align-self:center;border:0;background:transparent;padding:0;text-align:left;cursor:pointer}.place-name{display:block;font-size:14px;font-weight:780;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.place-location{display:block;font-size:11px;line-height:1.35;color:#5d6c64;margin-top:4px}.place-actions{display:flex;align-items:center;justify-content:space-between}.mini-action{width:38px;border:0;background:transparent;padding:5px 0;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:8px;text-transform:uppercase;font-weight:850;cursor:pointer}.mini-action svg{width:23px;height:23px;fill:none;stroke:#314139;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}.empty{padding:34px 20px;text-align:center;color:var(--muted)}
    .detail{height:100%;display:flex;flex-direction:column;background:#fff}.detail-bar{min-height:54px;display:flex;align-items:center;padding:0 8px;background:var(--green);color:#fff}.detail-bar .icon-btn svg{stroke:#fff}.detail-title{flex:1;font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.detail-hero{margin:16px 16px 0;height:150px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:66px;background:var(--thumb);box-shadow:inset 0 0 0 1px rgba(255,255,255,.3)}.detail-body{padding:17px 16px 24px;overflow:auto;-webkit-overflow-scrolling:touch}.detail-body h2{font-size:21px;margin:0 0 8px}.detail-body p{font-size:14px;line-height:1.55;color:#5d6963;margin:0}.detail-chip{display:inline-block;margin-top:14px;border:1px solid #d7e3dc;border-radius:999px;padding:6px 10px;font-size:11px;color:var(--green);font-weight:800}.route-cta{margin-top:17px;height:45px;border:0;border-radius:9px;background:var(--green);color:#fff;font-weight:800;padding:0 17px;display:flex;gap:9px;align-items:center;cursor:pointer}.route-cta svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.8}.meta-card{margin-top:13px;border-radius:10px;background:#f1f6f3;padding:12px;font-size:11px}.meta-card b{display:block;color:var(--green);margin-top:3px}
    .directions{position:absolute;z-index:30;top:16px;top:max(16px,env(safe-area-inset-top));left:16px;width:378px;padding:16px;border-radius:14px;background:rgba(255,255,255,.97);box-shadow:0 20px 50px rgba(8,34,23,.3);display:none}.directions.open{display:block}.directions h2{font-size:19px;margin:0 45px 14px 0}.directions .close-red{position:absolute;right:10px;top:10px}.direction-row{display:grid;grid-template-columns:22px 1fr;gap:10px;position:relative;padding-bottom:11px}.direction-row:not(:last-of-type)::after{content:"";position:absolute;left:7px;top:17px;bottom:-2px;width:3px;background:var(--green)}.direction-dot{width:16px;height:16px;border:4px solid #d5ece4;background:var(--green);border-radius:50%;margin-top:3px}.direction-label{display:block;font-size:11px;color:#77827c}.direction-value{display:block;font-weight:800;margin-top:2px}.route-summary{margin-top:7px;padding-top:11px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#68746d}.end-route{border:1px solid #cbd8d1;border-radius:8px;background:#fff;color:var(--green);padding:8px 11px;font-weight:800;cursor:pointer}
    .map-controls{position:absolute;z-index:21;right:16px;bottom:78px;bottom:max(78px,calc(env(safe-area-inset-bottom) + 68px));display:grid;gap:8px}.map-control{width:43px;height:43px;border:0;border-radius:9px;background:rgba(255,255,255,.94);box-shadow:0 4px 14px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;cursor:pointer}.map-control svg{width:23px;height:23px;fill:none;stroke:var(--green);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}.area-control{position:absolute;z-index:21;right:16px;bottom:18px;bottom:max(18px,env(safe-area-inset-bottom));display:flex;height:43px;border-radius:9px;background:rgba(255,255,255,.95);box-shadow:0 4px 14px rgba(0,0,0,.2);overflow:hidden}.area-label{display:flex;align-items:center;padding:0 13px;font-size:12px;border-right:1px solid var(--line)}.area-layer{width:43px;border:0;background:transparent;display:flex;align-items:center;justify-content:center}.area-layer svg{width:24px;height:24px;fill:none;stroke:var(--green);stroke-width:1.7}.brand{position:absolute;z-index:8;right:18px;bottom:3px;color:rgba(255,255,255,.9);font-weight:850;font-size:12px;text-shadow:0 1px 3px rgba(0,0,0,.6);pointer-events:none}.zoom-badge{position:absolute;z-index:8;right:67px;bottom:86px;bottom:max(86px,calc(env(safe-area-inset-bottom) + 76px));background:rgba(255,255,255,.9);padding:4px 7px;border-radius:6px;font-size:10px;color:var(--green);font-weight:850}.toast{position:absolute;z-index:50;left:50%;bottom:24px;bottom:max(24px,env(safe-area-inset-bottom));transform:translate(-50%,20px);background:#173f31;color:#fff;border-radius:10px;padding:10px 15px;font-size:13px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}.fullscreen-fallback{position:fixed!important;inset:0!important;z-index:9999!important;width:100vw!important;height:100vh!important}
    @media(min-aspect-ratio:959/1639){.scene-fit{height:100vh;height:var(--app-height,100vh);width:58.51vh;width:calc(var(--app-height,100vh) * .5851)}}
    @media(max-width:820px){.top-search{left:10px;top:10px;top:max(10px,env(safe-area-inset-top));width:calc(100% - 20px)}.category-strip{left:10px;right:10px;top:calc(max(10px,env(safe-area-inset-top)) + 58px);padding-right:4px}.lang-switch{top:calc(max(10px,env(safe-area-inset-top)) + 102px);right:10px}.sidebar{left:10px;right:10px;top:auto;bottom:max(10px,env(safe-area-inset-bottom));width:auto;height:49vh;height:min(49vh,440px);border-radius:16px;transform:translateY(0)}.sidebar.closed{transform:translateY(calc(100% + 28px));opacity:0}.directions{left:10px;top:10px;top:max(10px,env(safe-area-inset-top));width:calc(100% - 20px)}.place{grid-template-columns:56px minmax(0,1fr) 78px;min-height:75px;padding:8px}.place-thumb{width:56px;height:56px}.map-controls{right:10px}.area-control{right:10px}.brand{right:12px}.detail-hero{height:122px;font-size:55px}.pin{width:28px;height:36px}.reception-label{font-size:9px}}
    @media(max-height:600px) and (orientation:landscape){.sidebar{top:70px;bottom:10px;height:auto;width:340px}.top-search{width:340px}.category-strip{left:360px;top:max(10px,env(safe-area-inset-top))}.lang-switch{top:max(10px,env(safe-area-inset-top))}.sidebar.closed{transform:translateX(calc(-100% - 24px))}.detail-hero{height:96px}.place{min-height:68px}.place-thumb{width:51px;height:51px}.map-controls{bottom:64px}.area-control{bottom:10px}}
    @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
<main class="app"><section id="viewport" class="viewport" tabindex="0" aria-label="Mapa interativo do Summerville Resort">
  <div id="sceneFit" class="scene-fit"><div id="scenePan" class="scene-pan">
    <img id="mapImage" class="map-image" alt="Mapa ilustrado do Summerville Resort" draggable="false">
    <svg id="routeSvg" class="route-svg" viewBox="0 0 100 100" preserveAspectRatio="none" hidden aria-hidden="true"><polyline id="routeShadow" class="route-shadow" points=""/><polyline id="routeLine" class="route-line" points=""/></svg>
    <div id="pins" class="pins"></div>
    <div class="reception"><span class="reception-dot"></span><span id="receptionLabel" class="reception-label">Recepção</span></div>
  </div></div>
  <div class="top-search"><button id="menuBtn" class="icon-btn" type="button" aria-label="Abrir lista"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><input id="search" class="search-input" type="search" autocomplete="off" placeholder="O que você procura?"><button id="clearSearch" class="icon-btn clear-search" type="button" aria-label="Limpar"><svg viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg></button></div>
  <nav id="categories" class="category-strip" aria-label="Categorias"></nav>
  <div id="langSwitch" class="lang-switch" aria-label="Idioma">
    <button data-lang="pt" type="button" title="Português — Brasil" aria-label="Português do Brasil"><svg class="flag-icon" viewBox="0 0 60 40"><rect width="60" height="40" fill="#009b3a"/><path d="M30 4 55 20 30 36 5 20Z" fill="#ffdf00"/><circle cx="30" cy="20" r="9.5" fill="#002776"/><path d="M21.5 18.2c5.4-2.3 12.1-1.3 17 2.2" fill="none" stroke="#fff" stroke-width="1.4"/></svg></button>
    <button data-lang="en" type="button" title="English — United States" aria-label="English from the United States"><svg class="flag-icon" viewBox="0 0 60 40"><rect width="60" height="40" fill="#fff"/><path d="M0 0h60v3.08H0zm0 6.15h60v3.08H0zm0 6.16h60v3.08H0zm0 6.15h60v3.08H0zm0 6.16h60v3.08H0zm0 6.15h60v3.08H0zm0 6.15h60V40H0z" fill="#b22234"/><rect width="28" height="21.54" fill="#3c3b6e"/><g fill="#fff"><circle cx="4" cy="3.5" r="1"/><circle cx="10" cy="3.5" r="1"/><circle cx="16" cy="3.5" r="1"/><circle cx="22" cy="3.5" r="1"/><circle cx="7" cy="8" r="1"/><circle cx="13" cy="8" r="1"/><circle cx="19" cy="8" r="1"/><circle cx="25" cy="8" r="1"/><circle cx="4" cy="12.5" r="1"/><circle cx="10" cy="12.5" r="1"/><circle cx="16" cy="12.5" r="1"/><circle cx="22" cy="12.5" r="1"/><circle cx="7" cy="17" r="1"/><circle cx="13" cy="17" r="1"/><circle cx="19" cy="17" r="1"/><circle cx="25" cy="17" r="1"/></g></svg></button>
    <button data-lang="es" type="button" title="Español — España" aria-label="Español de España"><svg class="flag-icon" viewBox="0 0 60 40"><rect width="60" height="40" fill="#aa151b"/><rect y="10" width="60" height="20" fill="#f1bf00"/><g transform="translate(14 14)"><rect x="0" y="1" width="7" height="11" rx="1" fill="#aa151b"/><rect x="2" y="3" width="3" height="4" fill="#f1bf00"/><path d="M-1 1h9M-1 12h9" stroke="#aa151b" stroke-width="1.2"/></g></svg></button>
  </div>
  <aside id="sidebar" class="sidebar" aria-label="Lista de locais"></aside><section id="directions" class="directions" aria-live="polite"></section>
  <div class="map-controls"><button id="zoomIn" class="map-control" type="button" aria-label="Ampliar"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button><button id="zoomOut" class="map-control" type="button" aria-label="Reduzir"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button><button id="resetMap" class="map-control" type="button" aria-label="Centralizar"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></button><button id="fullscreen" class="map-control" type="button" aria-label="Tela cheia"><svg viewBox="0 0 24 24"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/></svg></button></div>
